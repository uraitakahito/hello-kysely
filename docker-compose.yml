services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: tutorial
      POSTGRES_PASSWORD: tutorial
      POSTGRES_DB: hello_kysely
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutorial -d hello_kysely"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: tutorial
      DATABASE_PASSWORD: tutorial
      DATABASE_NAME: hello_kysely
    depends_on:
      postgres:
        condition: service_healthy
    tty: true
    stdin_open: true

volumes:
  pgdata:
